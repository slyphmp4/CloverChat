prefix-hover:
  default-lines:
    - "&7"
  rules:
    admin:
      priority: 300
      match-type: permission-any
      permissions:
        - "cloverchat.rank.admin"
        - "ultrapermissions.group.admin"
      lines:
        - "&#FF2E2E ⚑ — &lАдмін"
        - "&7"
        - "&#E3ACAC ▪ Цей гравець є адміністратором сервера"
        - "&7"
        - "&#E0E0E0 ✉ Натисніть на нік, щоб написати ПП"
    moderator:
      priority: 200
      match-type: permission-any
      permissions:
        - "cloverchat.rank.moderator"
        - "ultrapermissions.group.moderator"
      lines:
        - "&#2EFFF5 ☁ — Модератор"
        - "&7"
        - "&#ACE3DB ▪ Цей гравець є модератором сервера"
        - "&7"
        - "&#E0E0E0 ✉ Натисніть на нік, щоб написати ПП"
    default:
      priority: 100
      match-type: permission-any
      permissions:
        - "cloverchat.rank.default"
        - "ultrapermissions.group.default"
      lines:
        - "&#9DA8A8 ♪ — Гравець"
        - "&7"
        - "&#C2C2C2 ▪ Звичайний гравець сервера"
        - "&7"
        - "&#E0E0E0 ✉ Натисніть на нік, щоб написати ПП"

