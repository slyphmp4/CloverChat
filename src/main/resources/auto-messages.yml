# CloverChat • Автосообщения
#
# Как это работает:
# 1) Поставьте enabled: true
# 2) Укажите интервал отправки в секундах
# 3) Добавьте сообщения в блок messages
#
# В сообщениях поддерживаются HEX-цвета (например: &#FFAA00), PlaceholderAPI и обычные цвет-коды (&a, &7 и т.д.)

enabled: true

# Задержка перед первым автосообщением после старта сервера
first-delay-seconds: 30

# Интервал между автосообщениями (в секундах)
interval-seconds: 180

# true  - случайный выбор сообщения
# false - по порядку, циклом
random-order: false

# Если true, автосообщения не отправляются, когда на сервере нет игроков
require-players-online: true

# Список автосообщений
messages:
  - id: "welcome"
    # Минимум игроков онлайн, чтобы это сообщение отправилось
    min-online: 0
    # Если указать permission, сообщение увидят только игроки с этим правом
    # Пример: "cloverchat.automessage.vip"
    permission: ""
    lines:
      - "&7"
      - "&#24e765★ Чат  &#89ffa6|  &#24e765Добро пожаловать на сервер, &#b2ffd8%player_name%"
      - "&#7defffНе забудьте ознакомиться с правилами и командами"
      - "&7"

  - id: "social"
    min-online: 0
    permission: ""
    lines:
      - "&7"
      - "&#24e765★ Чат  &#89ffa6|  &#24e765Присоединяйтесь к нашему сообществу"
      - "&#7defffСайт: &#b2ffd8example.com"
      - "&7"

  - id: "vip"
    min-online: 0
    permission: "cloverchat.automessage.vip"
    lines:
      - "&7"
      - "&#ffcb1b★ VIP  &#ffd98a|  &#fff2d9Спасибо за поддержку сервера"
      - "&7"
