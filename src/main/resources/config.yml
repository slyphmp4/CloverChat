hex-colors: true

language: "ru"

update-checker:
  enabled: true

# Cross-server chat sync through Velocity proxy.
# Requirement in velocity.toml:
# bungee-plugin-message-channel = true
#
# Setup steps:
# 1) Put CloverChat on every backend server behind Velocity.
# 2) Set proxy-sync.enabled: true on every server.
# 3) Set unique proxy-sync.server-id for each backend server.
# 4) Keep the same proxy-sync.subchannel on all servers.
# 5) Choose which chat modes to sync in proxy-sync.sync-modes.
proxy-sync:
  enabled: false
  server-id: "survival"
  target-server: "ALL"
  subchannel: "CloverChatSync"
  dedup-cache-seconds: 120
  debug-log: false
  sync-modes:
    global: true
    group: true
    local: false
  server-tag:
    enabled: true
    format: "&#65798F[&#AFCFFF%server%&#65798F] "

chat-name-placeholders:
  - "%player_name%"
  - "%cloverrep_nick%"

chat-reputation-placeholders:
  - "%cloverrep_reputation%"

reputation-hover:
  enabled: true
  suggest-command: "/rep "

local-chat:
  enabled: true
  radius: 70

global-chat:
  enabled: true
  prefix: "!"

# Group chat channels (ready preset)
# Quick start:
# 1) Keep group-chat.enabled: true
# 2) Give rights for the needed channel:
#    cloverchat.channel.<channel>.send
#    cloverchat.channel.<channel>.view
# 3) Player writes message with channel prefix:
#    @a test  -> admin channel
#    @m test  -> moderator channel
#    @v test  -> vip channel
#    @b test  -> builder channel
# 4) Longest prefix wins if more than one prefix matches
group-chat:
  enabled: true
  channels:
    admin:
      enabled: true
      prefix: "@a "
      display-name: "Admin"
      send-permission: "cloverchat.channel.admin.send"
      view-permission: "cloverchat.channel.admin.view"
    moderator:
      enabled: true
      prefix: "@m "
      display-name: "Moderator"
      send-permission: "cloverchat.channel.moderator.send"
      view-permission: "cloverchat.channel.moderator.view"
    vip:
      enabled: true
      prefix: "@v "
      display-name: "VIP"
      send-permission: "cloverchat.channel.vip.send"
      view-permission: "cloverchat.channel.vip.view"
    builder:
      enabled: true
      prefix: "@b "
      display-name: "Builder"
      send-permission: "cloverchat.channel.builder.send"
      view-permission: "cloverchat.channel.builder.view"

private-chat:
  enabled: true
  cooldown-seconds: 5
  notification-sound: "minecraft:block.note_block.pling"

quick-pm:
  enabled: true
  require-sneak: false
  suggest-command: "/m %target_name% "

mention:
  sound: "minecraft:block.note_block.pling"

chat-above-head:
  enabled: true
  duration-seconds: 4
  y-offset: 2.25
  max-length: 72
  combo-enabled: true

prefix-hover:
  enabled: true

message-hover:
  enabled: true
  copy-id-on-click: true
  time-format: "HH:mm:ss"

links:
  enabled: true

commands-cooldown:
  enabled: true
  seconds: 5

join-message:
  enabled: true

leave-message:
  enabled: true

censor:
  enabled: true
  words:
    - "херня"
    - "хрен"
    - "дурак"
    - "дура"
