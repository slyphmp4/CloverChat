hex-colors: true

language: "ru"

update-checker:
  enabled: true

chat-name-placeholders:
  - "%player_name%"
  - "%cloverrep_nick%"

chat-reputation-placeholders:
  - "%cloverrep_reputation%"

reputation-hover:
  enabled: true
  suggest-command: "/rep "

local-chat:
  enabled: true
  radius: 70

global-chat:
  enabled: true
  prefix: "!"

# Групповые каналы чата.
# Как работает:
# 1) Включите group-chat.enabled: true
# 2) Создайте канал в group-chat.channels (например staff, vip, donor)
# 3) Укажите prefix, с которого начинается сообщение для канала
# 4) Укажите права send-permission и view-permission
# 5) Выдайте права через ваш плагин прав (например UltraPermissions)
#
# Что означает каждый параметр канала:
# enabled: true/false — включен ли конкретный канал
# prefix: префикс канала в начале сообщения (например "@s " или "@vip ")
# display-name: имя канала для формата чата и hover
# send-permission: право на отправку сообщений в этот канал
# view-permission: право на просмотр сообщений этого канала
#
# Важно:
# - Приоритет по самому длинному совпадающему prefix
# - Если игрок написал сообщение без channel prefix, сработает обычный local/global чат
# - Рекомендуется использовать prefix с пробелом на конце: "@s ", "@v ", "@admin "
#
# Пример:
# Игрок пишет: "@s проверка канала"
# Если у игрока есть send-permission для staff, сообщение уйдет в staff-канал
# Увидят его только игроки с view-permission staff (и сам отправитель)
group-chat:
  enabled: false
  channels:
    staff:
      enabled: true
      prefix: "@s "
      display-name: "Staff"
      send-permission: "cloverchat.channel.staff.send"
      view-permission: "cloverchat.channel.staff.view"
    vip:
      enabled: true
      prefix: "@v "
      display-name: "VIP"
      send-permission: "cloverchat.channel.vip.send"
      view-permission: "cloverchat.channel.vip.view"

private-chat:
  enabled: true
  cooldown-seconds: 5
  notification-sound: "minecraft:block.note_block.pling"

quick-pm:
  enabled: true
  require-sneak: false
  suggest-command: "/m %target_name% "

mention:
  sound: "minecraft:block.note_block.pling"

chat-above-head:
  enabled: true
  duration-seconds: 4
  y-offset: 2.25
  max-length: 72
  combo-enabled: true

prefix-hover:
  enabled: true

message-hover:
  enabled: true
  copy-id-on-click: true
  time-format: "HH:mm:ss"

links:
  enabled: true

commands-cooldown:
  enabled: true
  seconds: 5

join-message:
  enabled: true

leave-message:
  enabled: true

censor:
  enabled: true
  words:
    - "херня"
    - "хрен"
    - "дурак"
    - "дура"
