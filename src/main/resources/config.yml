hex-colors: true

language: "ru"

update-checker:
  enabled: true

chat-name-placeholders:
  - "%player_name%"
  - "%cloverrep_nick%"

chat-reputation-placeholders:
  - "%cloverrep_reputation%"

reputation-hover:
  enabled: true
  suggest-command: "/rep "

local-chat:
  enabled: true
  radius: 70

global-chat:
  enabled: true
  prefix: "!"

# Additional channels with custom prefixes.
# Priority is by longest prefix match.
# Example:
#   @hello  -> vip channel
#   @h      -> another channel
# Message "@hello text" will go to "vip" because "@hello" is longer.
group-chat:
  enabled: false
  channels:
    staff:
      enabled: true
      prefix: "@s "
      display-name: "Staff"
      send-permission: "cloverchat.channel.staff.send"
      view-permission: "cloverchat.channel.staff.view"
    vip:
      enabled: true
      prefix: "@v "
      display-name: "VIP"
      send-permission: "cloverchat.channel.vip.send"
      view-permission: "cloverchat.channel.vip.view"

private-chat:
  enabled: true
  cooldown-seconds: 5
  notification-sound: "minecraft:block.note_block.pling"

quick-pm:
  enabled: true
  require-sneak: false
  suggest-command: "/m %target_name% "

mention:
  sound: "minecraft:block.note_block.pling"

chat-above-head:
  enabled: true
  duration-seconds: 4
  y-offset: 2.25
  max-length: 72
  combo-enabled: true

prefix-hover:
  enabled: true

message-hover:
  enabled: true
  copy-id-on-click: true
  time-format: "HH:mm:ss"

links:
  enabled: true

commands-cooldown:
  enabled: true
  seconds: 5

join-message:
  enabled: true

leave-message:
  enabled: true

censor:
  enabled: true
  words:
    - "херня"
    - "хрен"
    - "дурак"
    - "дура"
