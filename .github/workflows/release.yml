name: Release

on:
  workflow_dispatch:
    inputs:
      update_type:
        description: Update type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
      make_latest:
        description: Mark release as latest
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Bump Version
        id: bump
        run: |
          if [ "${{ inputs.update_type }}" = "minor" ]; then
            ./gradlew bumpMinorVersion --no-daemon
          else
            ./gradlew bumpPatchVersion --no-daemon
          fi
          VERSION=$(grep '^pluginVersion=' gradle.properties | cut -d'=' -f2)
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit Version
        run: |
          git config user.name "slyphmp4"
          git config user.email "slyphmp4@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: bump plugin version to ${{ steps.bump.outputs.value }}" || true
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.bump.outputs.value }}
          name: v${{ steps.bump.outputs.value }}
          artifacts: build/libs/*.jar
          allowUpdates: true
          generateReleaseNotes: true
          makeLatest: ${{ inputs.make_latest }}
